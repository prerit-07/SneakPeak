spring.application.name=streetpeak

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/streetpeak}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:234@#%012prerit0712}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:local-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:local-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

spring.ai.openai.api-key=${OPENAI_API_KEY:sk-test-key}
spring.ai.openai.chat.options.model=${OPENAI_MODEL:gpt-4o-mini}

app.base-url=${APP_BASE_URL:http://localhost:8080}
app.email-verification.expiry-hours=24
