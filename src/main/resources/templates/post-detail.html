<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title th:text="${post.sneakerName} + ' · SneakPeak'">Post · SneakPeak</title>
<link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>

<nav>
  <a th:href="@{/}" class="nav-logo">SNEAK<span>PEAK</span></a>
  <div class="nav-r">
    <a sec:authorize="isAuthenticated()" class="btn-post" th:href="@{/posts/new}">+ Post Deal</a>
    <div class="avatar" sec:authorize="isAuthenticated()" th:text="${#strings.substring(#authentication.name, 0, 1).toUpperCase()}">P</div>
  </div>
</nav>

<div class="detail-wrap">
  <a class="back" th:href="@{/}">← Back to feed</a>
  
  <div class="detail-card">
    <div class="detail-meta">
      <div class="post-avatar" style="background:#ffd6cc;color:#c82000" th:text="${#strings.substring(post.user.username, 0, 1).toUpperCase()}">U</div>
      <div class="post-meta" style="flex:1;">
        <div class="post-author" th:text="${post.user.username}">Author Name</div>
        <div class="post-time" th:text="${#temporals.format(post.createdAt, 'h:mm a · dd MMM yyyy')}">2h ago · Location</div>
      </div>
      <span class="post-badge" style="background:var(--accent);color:#fff" th:text="${post.sale} ? '🔥 Deal' : post.category">🔥 Deal</span>
    </div>
    
    <div class="detail-sneaker" th:text="${post.sneakerName}">Adidas Samba OG White</div>
    
    <div class="post-meta-row">
      <div class="meta-chip price" th:text="'₹' + ${post.sale ? post.offeredPrice : post.price}">₹5,499</div>
      <div class="meta-chip platform" th:text="${post.platform.label}">🛍 Myntra</div>
      <div class="meta-chip event" th:if="${post.eventName}" th:text="'⚡ ' + ${post.eventName}">⚡ EOSS 2026</div>
      <div class="meta-chip" th:if="${post.offerDetails}" th:text="${post.offerDetails}">HDFC card -10%</div>
    </div>
    
    <div class="detail-body" th:utext="${post.description}">Description</div>

    <div th:if="${post.productLink}" style="margin: 24px 0;">
      <a th:href="${post.productLink}" target="_blank" class="submit-btn" style="display: inline-flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; width: auto; padding: 12px 24px; font-size: 15px; border-radius: var(--radius-sm); background: var(--accent); border-color: var(--accent);">🛍 SHOP DEAL ON <span th:text="${#strings.toUpperCase(post.platform.label)}">PLATFORM</span> →</a>
    </div>
    
    <div class="post-actions">
      <form sec:authorize="isAuthenticated()" th:action="@{/posts/{id}/vote(id=${post.id})}" method="post" style="display:inline;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" name="returnTo" value="detail">
        <button type="submit" class="action-btn voted">❤️ <span th:text="${voteCount}">47</span> upvotes</button>
      </form>
      <button class="action-btn">💬 <span th:text="${commentCount}">23</span> comments</button>
      <button class="action-btn">↗ Share</button>
    </div>
  </div>

  <div class="comments-box">
    <div class="comments-title">Comments <span style="color:var(--muted);font-size:16px;font-family:var(--font-body);font-weight:400" th:text="'(' + ${commentCount} + ')'">( 23 )</span></div>
    
    <div th:if="${error}" class="error-msg" th:text="${error}"></div>
    
    <div th:each="comment : ${comments}" class="comment">
      <div class="c-author" th:text="${comment.user.username}">Author</div>
      <div class="c-text" th:text="${comment.content}">Comment text</div>
      <div class="c-time" th:text="${#temporals.format(comment.createdAt, 'h:mm a · dd MMM yyyy')}">35 min ago</div>
    </div>
    
    <div th:if="${comments.isEmpty()}" class="empty-state">
      <p>No comments yet. Be the first to share!</p>
    </div>
    
    <div sec:authorize="isAuthenticated()" class="comment-input-row" style="margin-top:20px;border-top:1px solid var(--border);padding-top:16px">
      <form th:action="@{/posts/{id}/comments(id=${post.id})}" method="post" style="width:100%;display:flex;gap:10px">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="text" name="content" class="comment-input" placeholder="Add a comment..." required/>
        <button type="submit" class="c-submit">Post</button>
      </form>
    </div>
    
    <div sec:authorize="!isAuthenticated()" style="text-align:center;padding:20px;color:var(--muted)">
      <a th:href="@{/login}" style="color:var(--accent);text-decoration:none">Sign in</a> to comment
    </div>
  </div>
</div>

</body>
</html>
