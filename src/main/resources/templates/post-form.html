<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Share a Find · SneakPeak</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<header class="topbar">
    <div class="shell">
        <a class="brand" th:href="@{/}">SneakPeak <span class="brand-dot"></span></a>
        <nav class="nav">
            <a th:href="@{/}">Browse Feed</a>
            <div class="nav-separator"></div>
            <span sec:authorize="isAuthenticated()" class="nav-username" th:text="${currentDisplayName}">user</span>
        </nav>
    </div>
</header>

<main class="shell page">
    <div class="page-title">
        <div>
            <span style="display: block; font-size: 13px; text-transform: uppercase; letter-spacing: .04em; color: var(--ink-4); margin-bottom: 4px;">Share</span>
            <h1>Post a Find</h1>
        </div>
    </div>

    <div style="max-width: 680px;">
        <div class="card">
            
            <!-- Form Errors -->
            <div class="errors" th:if="${#fields.hasAnyErrors()}">
                <div th:each="err : ${#fields.allErrors()}" th:text="${err}">Error</div>
            </div>

            <!-- Post Form -->
            <form class="form" th:action="@{/posts}" th:object="${postForm}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                
                <!-- Basic Info Section -->
                <div class="form-section">
                    <h3 class="form-section-title">About the Sneaker</h3>
                    
                    <div class="field">
                        <label for="sneakerName">Sneaker Name</label>
                        <input id="sneakerName" th:field="*{sneakerName}" required maxlength="120" placeholder="e.g. Nike Air Max 90">
                    </div>
                    
                    <div class="field">
                        <label for="description">Description</label>
                        <textarea id="description" th:field="*{description}" required maxlength="1000" placeholder="What's special about this find? Why should others care?"></textarea>
                    </div>
                </div>

                <!-- Pricing Section -->
                <div class="form-section">
                    <h3 class="form-section-title">Pricing & Links</h3>
                    
                    <div class="field">
                        <label for="price">Original Price (₹)</label>
                        <input id="price" th:field="*{price}" type="number" min="0.01" step="0.01" required placeholder="0.00">
                    </div>
                    
                    <div class="field">
                        <label for="productLink">Product Link</label>
                        <input id="productLink" th:field="*{productLink}" type="url" maxlength="500" placeholder="https://example.com/product">
                    </div>
                </div>

                <!-- Deal Section -->
                <label class="checkbox-row" style="margin: 20px 0; padding: 0;">
                    <input id="sale" th:field="*{sale}" type="checkbox">
                    <span>Mark as a sale or special deal</span>
                </label>

                <div id="sale-fields" class="form" style="display: none;">
                    <div class="form-section">
                        <h3 class="form-section-title">Deal Information</h3>
                        
                        <div class="field">
                            <label for="platform">Where</label>
                            <select id="platform" th:field="*{platform}">
                                <option value="">Choose platform</option>
                                <option th:each="platform : ${platforms}" th:value="${platform}" th:text="${platform.label}">Platform</option>
                            </select>
                        </div>
                        
                        <div class="field">
                            <label for="eventName">Event Name</label>
                            <input id="eventName" th:field="*{eventName}" maxlength="120" placeholder="e.g. Summer Sale, Flash Deal">
                        </div>
                        
                        <div class="field">
                            <label for="offeredPrice">Deal Price (₹)</label>
                            <input id="offeredPrice" th:field="*{offeredPrice}" type="number" min="0.01" step="0.01" placeholder="0.00">
                        </div>
                        
                        <div class="field">
                            <label for="offerDetails">Deal Details</label>
                            <textarea id="offerDetails" th:field="*{offerDetails}" maxlength="1200" placeholder="Coupon code, validity period, additional conditions..."></textarea>
                        </div>
                    </div>
                </div>

                <button class="button" type="submit" style="width: 100%;">Post this Find</button>
            </form>

        </div>
    </div>
</main>

<script>
    const sale = document.getElementById('sale');
    const fields = document.getElementById('sale-fields');
    function syncSaleFields() {
        fields.style.display = sale.checked ? 'grid' : 'none';
    }
    sale.addEventListener('change', syncSaleFields);
    syncSaleFields();
</script>

</body>
</html>
