<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Post a Deal · SneakPeak</title>
<link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>

<nav>
  <a th:href="@{/}" class="nav-logo">SNEAK<span>PEAK</span></a>
  <div class="nav-r">
    <a th:href="@{/}" class="btn-post">← Back</a>
    <div class="avatar" sec:authorize="isAuthenticated()" th:text="${#strings.substring(#authentication.name, 0, 1).toUpperCase()}">P</div>
  </div>
</nav>

<div class="detail-wrap">
  <div class="form-card">
    <div class="form-title">POST A <span style="color:var(--accent)">DEAL</span></div>
    <div class="form-sub">AI verified — sneakers only 🤖</div>
    
    <form th:action="@{/posts}" th:object="${postForm}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <input type="hidden" th:field="*{sale}" id="saleInput" />
      
      <div th:if="${#fields.hasAnyErrors()}" class="error-msg">
        <div th:each="err : ${#fields.allErrors()}" th:text="${err}">Error</div>
      </div>
      
      <div class="fg">
        <label>Post Type</label>
        <div class="category-picker">
          <button type="button" id="cat-deal" class="cat-btn active" onclick="selCat(this, true)">Deal</button>
          <button type="button" id="cat-cop" class="cat-btn" onclick="selCat(this, false)">Cop or Drop?</button>
          <button type="button" id="cat-review" class="cat-btn" onclick="selCat(this, false)">Review</button>
          <button type="button" id="cat-sizing" class="cat-btn" onclick="selCat(this, false)">Sizing</button>
        </div>
      </div>
      
      <div class="fg">
        <label>Sneaker Name *</label>
        <input type="text" th:field="*{sneakerName}" placeholder="e.g. Adidas Samba OG White" required/>
      </div>
      
      <div class="fg">
        <label>Regular Price (₹) *</label>
        <input type="number" th:field="*{price}" id="price" placeholder="e.g. 5499" required min="0"/>
      </div>
      
      <!-- Toggleable Sale specific fields -->
      <div id="saleSection">
        <div class="fg">
          <label>Platform *</label>
          <select th:field="*{platform}" id="platformSelect">
            <option value="">Select platform</option>
            <option th:each="p : ${platforms}" th:value="${p}" th:text="${p.label}">Platform</option>
          </select>
        </div>
        
        <div class="row2">
          <div class="fg">
            <label>Sale Event *</label>
            <input type="text" th:field="*{eventName}" id="eventNameInput" placeholder="e.g. EOSS, Big Billion Days"/>
          </div>
          <div class="fg">
            <label>Deal Price (₹) *</label>
            <input type="number" th:field="*{offeredPrice}" id="offeredPriceInput" placeholder="e.g. 4949" min="0"/>
          </div>
        </div>
        
        <div class="fg">
          <label>Offer Details *</label>
          <input type="text" th:field="*{offerDetails}" id="offerDetailsInput" placeholder="e.g. SBI card 10% off, SBI cashback"/>
        </div>
        
        <div class="fg">
          <label>Product Link (optional)</label>
          <input type="url" th:field="*{productLink}" placeholder="https://example.com/product"/>
        </div>
      </div>
      
      <div class="fg">
        <label>What do you want to say? *</label>
        <textarea th:field="*{description}" placeholder="Share deal details, your review, sizing tips... anything that helps fellow sneakerheads 👟" required></textarea>
      </div>
      
      <div class="ai-tag">🤖 AI verified · sneaker content only</div>
      <button type="submit" class="submit-btn">DROP IT →</button>
    </form>
  </div>
</div>

<script>
function selCat(btn, isSale){
  // Toggle active button style
  document.querySelectorAll('.cat-btn').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  
  // Update the hidden input
  document.getElementById('saleInput').value = isSale;
  
  // Toggle sale-specific fields visibility and required attributes
  const saleSection = document.getElementById('saleSection');
  const platformSelect = document.getElementById('platformSelect');
  const eventNameInput = document.getElementById('eventNameInput');
  const offeredPriceInput = document.getElementById('offeredPriceInput');
  const offerDetailsInput = document.getElementById('offerDetailsInput');

  if (isSale) {
    saleSection.style.display = 'block';
    platformSelect.required = true;
    eventNameInput.required = true;
    offeredPriceInput.required = true;
    offerDetailsInput.required = true;
  } else {
    saleSection.style.display = 'none';
    platformSelect.required = false;
    eventNameInput.required = false;
    offeredPriceInput.required = false;
    offerDetailsInput.required = false;
  }
}

// Sync selection on page load
document.addEventListener("DOMContentLoaded", () => {
  const saleInput = document.getElementById('saleInput');
  const price = document.getElementById('price').value;
  // If sale input is explicitly "true" OR if it's a fresh form (sale is false but price is not set yet), default to true/Deal
  const isSale = saleInput.value === "true" || (saleInput.value !== "false" && !price);
  
  if (isSale) {
    selCat(document.getElementById('cat-deal'), true);
  } else {
    selCat(document.getElementById('cat-cop'), false);
  }
});
</script>
</body>
</html>
