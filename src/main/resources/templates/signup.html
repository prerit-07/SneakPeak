<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Join · SneakPeak</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<header class="topbar">
    <div class="shell">
        <a class="brand" th:href="@{/}">SneakPeak <span class="brand-dot"></span></a>
        <nav class="nav">
            <a th:href="@{/login}">Sign in</a>
        </nav>
    </div>
</header>

<div class="auth-wrap">
    <div class="auth-card">

        <div class="auth-header">
            <p class="page-eyebrow" style="display: block;">Get started</p>
            <h1>Create account</h1>
            <p class="auth-tagline">Join the community of sneaker enthusiasts</p>
        </div>

        <!-- Form Errors -->
        <div class="errors" th:if="${#fields.hasAnyErrors()}">
            <div th:each="err : ${#fields.allErrors()}" th:text="${err}">Error</div>
        </div>

        <!-- Signup Form -->
        <form class="form" th:action="@{/auth/signup}" th:object="${signupForm}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            
            <div class="field">
                <label for="username">Username</label>
                <input id="username" th:field="*{username}" required minlength="3" maxlength="40" placeholder="Choose your handle">
            </div>
            
            <div class="field">
                <label for="email">Email</label>
                <input id="email" th:field="*{email}" type="email" required maxlength="160" placeholder="you@example.com">
            </div>
            
            <div class="field">
                <label for="password">Password</label>
                <input id="password" th:field="*{password}" type="password" required minlength="8" placeholder="At least 8 characters">
            </div>
            
            <button class="button" type="submit">Create account</button>
        </form>

        <div class="auth-divider">or continue with</div>

        <!-- Google OAuth -->
        <a class="btn-oauth" th:href="@{/oauth2/authorization/google}">
            <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Google
        </a>

        <div class="auth-footer">
            Already have an account?
            <a th:href="@{/login}">Sign in</a>
        </div>

    </div>
</div>

</body>
</html>
