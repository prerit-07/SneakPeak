<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Signup · SneakPeak</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="topbar">
    <div class="shell">
        <a class="brand" th:href="@{/}">SneakPeak</a>
        <nav class="nav">
            <a th:href="@{/login}">Login</a>
        </nav>
    </div>
</header>
<main class="shell page">
    <div class="card">
        <h1>Signup</h1>
        <form class="form" th:action="@{/auth/signup}" th:object="${signupForm}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="errors" th:if="${#fields.hasAnyErrors()}">
                <div th:each="err : ${#fields.allErrors()}" th:text="${err}">Error</div>
            </div>
            <div class="field">
                <label for="username">Username</label>
                <input id="username" th:field="*{username}" required minlength="3" maxlength="40">
            </div>
            <div class="field">
                <label for="email">Email</label>
                <input id="email" th:field="*{email}" type="email" required maxlength="160">
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input id="password" th:field="*{password}" type="password" required minlength="8">
            </div>
            <button class="button" type="submit">Signup</button>
        </form>
    </div>
</main>
</body>
</html>
