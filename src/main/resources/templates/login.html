<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login · SneakPeak</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="topbar">
    <div class="shell">
        <a class="brand" th:href="@{/}">SneakPeak</a>
        <nav class="nav">
            <a th:href="@{/signup}">Signup</a>
        </nav>
    </div>
</header>
<main class="shell page">
    <div class="card">
        <h1>Login</h1>
        <p class="alert" th:if="${message}" th:text="${message}">Message</p>
        <p class="alert" th:if="${verificationLink}">
            Dev verification link:
            <a th:href="${verificationLink}" th:text="${verificationLink}">verification link</a>
        </p>
        <p class="alert error" th:if="${error}" th:text="${error}">Error</p>
        <p class="alert error" th:if="${param.error}">Login failed. Check your password or verify your email first.</p>
        <form class="form" th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="field">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" required>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" required>
            </div>
            <button class="button" type="submit">Login</button>
        </form>
        <div class="actions">
            <a class="button secondary" th:href="@{/oauth2/authorization/google}">Continue with Google</a>
            <a th:href="@{/signup}">Create account</a>
        </div>
    </div>
</main>
</body>
</html>
