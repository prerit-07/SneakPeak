<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SneakPeak</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="topbar">
    <div class="shell">
        <a class="brand" th:href="@{/}">SneakPeak</a>
        <nav class="nav">
            <a sec:authorize="isAuthenticated()" th:href="@{/posts/new}">Post</a>
            <span sec:authorize="isAuthenticated()" th:text="${currentDisplayName}">user</span>
            <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="link-button" type="submit">Logout</button>
            </form>
            <a sec:authorize="!isAuthenticated()" th:href="@{/login}">Login</a>
            <a sec:authorize="!isAuthenticated()" th:href="@{/signup}">Signup</a>
        </nav>
    </div>
</header>
<main class="shell page">
    <div class="page-title">
        <h1>Feed</h1>
        <a sec:authorize="isAuthenticated()" class="button" th:href="@{/posts/new}">Create post</a>
    </div>

    <section class="stack" th:if="${posts.isEmpty()}">
        <div class="card">No posts yet.</div>
    </section>

    <section class="stack">
        <article class="card" th:each="item : ${posts}">
            <div class="post-header">
                <div>
                    <h2><a th:href="@{/posts/{id}(id=${item.post.id})}" th:text="${item.post.sneakerName}">Sneaker</a></h2>
                    <div class="muted">
                        Posted by <span th:text="${item.post.user.username}">user</span>
                        · <span th:text="${#temporals.format(item.post.createdAt, 'dd MMM yyyy HH:mm')}">time</span>
                    </div>
                </div>
                <div class="price">₹<span th:text="${item.displayPrice()}">0</span></div>
            </div>
            <p th:text="${item.post.description}">Description</p>
            <div th:if="${item.post.productLink}">
                <a th:href="${item.post.productLink}" target="_blank" class="button secondary">View Product</a>
            </div>
            <div class="deal" th:if="${item.post.sale}">
                <strong th:text="${item.post.platform.label}">Platform</strong>
                · <span th:text="${item.post.eventName}">Event</span>
                <div>Original price: ₹<span th:text="${item.post.price}">0</span></div>
                <div>Offered price: ₹<span th:text="${item.post.offeredPrice}">0</span></div>
                <p th:text="${item.post.offerDetails}">Offer details</p>
            </div>
            <div class="actions">
                <form sec:authorize="isAuthenticated()" th:action="@{/posts/{id}/vote(id=${item.post.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="button secondary" type="submit">Upvote</button>
                </form>
                <span>▲ <span th:text="${item.voteCount}">0</span></span>
                <a th:href="@{/posts/{id}(id=${item.post.id})}">
                    <span th:text="${item.commentCount}">0</span> comments
                </a>
            </div>
        </article>
    </section>
</main>
</body>
</html>
